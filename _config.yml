title: GIS, Data und das Rettungswesen
description: Geoinformatik + Datascience + BOS
github_username: tobiaswildezahn

# Email and twitter are optional:
email: tobias.zahn.hamburg@gmail.com
twitter_username: tobiaswildezahn
facebook_username: tobias.zahn1
instagram_username: zahn.tobias

# Set this to true to get LaTeX math equation support
use_math: true
# google analytics
google_analytics: UA-NNNNNNNN-N
# Everything below here can be ignored, unless you want to change the theme entirely
#theme: minima
plugins:
  - jekyll-feed
  - jemoji
  - jekyll-remote-theme
  
# dark theme  
remote_theme: songzivong/dark-minima

  
titles_from_headings:
  enabled:     true
  strip_title: true
  collections: true

highlighter: rouge
markdown: kramdown
kramdown:
  math_engine: katex
  input: GFM
  auto_ids: true
  hard_wrap: false
  syntax_highlighter: rouge
